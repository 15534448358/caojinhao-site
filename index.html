<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>曹晋昊 | Personal Site</title>
  <style>
    :root {
      --bg: #f7f7f3;
      --text: #0f0f10;
      --muted: rgba(15, 15, 16, 0.48);
      --line: rgba(15, 15, 16, 0.08);
      --dot: rgba(15, 15, 16, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      background: var(--bg);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 0) 0 0 / 24px 24px,
        var(--bg);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right, transparent 0, transparent calc(50% - 740px), var(--line) calc(50% - 740px), var(--line) calc(50% - 739px), transparent calc(50% - 739px), transparent calc(50% + 739px), var(--line) calc(50% + 739px), var(--line) calc(50% + 740px), transparent calc(50% + 740px)),
        linear-gradient(to bottom, transparent 72px, var(--line) 72px, var(--line) 73px, transparent 73px);
      z-index: 1;
    }

    .topbar {
      position: relative;
      z-index: 5;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.2em;
    }

    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 8px 12px;
      border-radius: 999px;
      transition: background 0.22s ease, transform 0.22s ease, opacity 0.22s ease;
      color: rgba(15, 15, 16, 0.72);
    }

    .nav a:hover {
      background: rgba(15, 15, 16, 0.06);
      transform: translateY(-1px);
      color: rgba(15, 15, 16, 0.96);
    }

    .lang {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .lang-pill {
      height: 28px;
      min-width: 28px;
      padding: 0 10px;
      border: 1px solid rgba(15, 15, 16, 0.12);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(15, 15, 16, 0.82);
      background: rgba(255,255,255,0.45);
    }

    .stage {
      position: relative;
      min-height: calc(100vh - 72px);
      z-index: 3;
      isolation: isolate;
    }

    .orbs {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #000;
      will-change: transform;
      transform: translate3d(0, 0, 0);
      box-shadow: none;
    }

    .orb--main {
      width: 240px;
      height: 240px;
      left: 0;
      top: 0;
    }

    .orb--sub {
      width: 160px;
      height: 160px;
      left: 0;
      top: 0;
      opacity: 1;
    }

    .orb__label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      user-select: none;
    }

    .title-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 4;
      pointer-events: none;
    }

    .title-track {
      transform: translate3d(0,0,0) rotate(-4deg);
      transform-origin: center center;
      will-change: transform;
    }

    .title {
      margin: 0;
      font-size: clamp(56px, 10vw, 132px);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: -0.07em;
      color: #fff;
      mix-blend-mode: difference;
      user-select: none;
      white-space: nowrap;
    }

    .title strong {
      font-weight: 950;
    }

    .title .name {
      display: inline-block;
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.08em;
      margin-left: 0.02em;
      transform-origin: center center;
      will-change: transform;
    }

    .meta {
      margin-top: 18px;
      text-align: center;
      font-size: clamp(14px, 1.4vw, 20px);
      color: rgba(15, 15, 16, 0.46);
      letter-spacing: -0.02em;
      user-select: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(15, 15, 16, 0.28);
      letter-spacing: 0.04em;
      z-index: 4;
      user-select: none;
    }

    .corner-note {
      position: absolute;
      right: 28px;
      bottom: 28px;
      z-index: 4;
      font-size: 12px;
      color: rgba(15, 15, 16, 0.34);
      letter-spacing: 0.04em;
      user-select: none;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 0 16px;
        height: 64px;
      }

      .hero::before {
        background:
          linear-gradient(to bottom, transparent 64px, var(--line) 64px, var(--line) 65px, transparent 65px);
      }

      .nav {
        gap: 4px;
      }

      .nav a {
        padding: 6px 8px;
        font-size: 12px;
      }

      .lang {
        display: none;
      }

      .orb--main {
        width: 160px;
        height: 160px;
      }

      .orb--sub {
        width: 110px;
        height: 110px;
      }

      .title-wrap {
        padding: 20px;
      }

      .title {
        white-space: normal;
        text-align: center;
      }

      .meta {
        margin-top: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero" id="hero">
      <header class="topbar">
        <div class="brand">JINHAO</div>

        <nav class="nav">
          <a href="#about">关于</a>
          <a href="#skills">技能</a>
          <a href="#projects">项目</a>
          <a href="#contact">合作</a>
        </nav>

        <div class="lang">
          <span>中国 / 江苏</span>
          <span class="lang-pill">EN</span>
        </div>
      </header>

      <div class="stage" id="stage">
        <div class="orbs">
          <div class="orb orb--main" id="orbMain">
            <div class="orb__label">FOCUS</div>
          </div>
          <div class="orb orb--sub" id="orbSub">
            <div class="orb__label">MOVE</div>
          </div>
        </div>

        <div class="title-wrap">
          <div class="title-track" id="titleTrack">
            <h1 class="title">
              <strong>HELLO, I'M</strong>
              <span class="name" id="namePart">Jinhao</span>
            </h1>
            <div class="meta">ERP / MES 实施顾问 / 项目交付</div>
          </div>
        </div>

        <div class="hint">移动鼠标看标题与黑球联动变化</div>
        <div class="corner-note">2026 / Personal Site</div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const hero = document.getElementById("hero");
      const stage = document.getElementById("stage");
      const titleTrack = document.getElementById("titleTrack");
      const namePart = document.getElementById("namePart");
      const orbMain = document.getElementById("orbMain");
      const orbSub = document.getElementById("orbSub");

      if (!hero || !stage || !titleTrack || !namePart || !orbMain || !orbSub) return;

      let rect = stage.getBoundingClientRect();

      const pointer = {
        x: rect.width * 0.5,
        y: rect.height * 0.5
      };

      const main = {
        x: rect.width * 0.18,
        y: rect.height * 0.54,
        tx: rect.width * 0.18,
        ty: rect.height * 0.54
      };

      const sub = {
        x: rect.width * 0.86,
        y: rect.height * 0.72,
        tx: rect.width * 0.86,
        ty: rect.height * 0.72
      };

      const titleState = {
        x: 0,
        y: 0,
        tx: 0,
        ty: 0,
        r: -4,
        tr: -4
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, n) {
        return a + (b - a) * n;
      }

      function refreshRect() {
        rect = stage.getBoundingClientRect();
      }

      function setPointer(clientX, clientY) {
        pointer.x = clientX - rect.left;
        pointer.y = clientY - rect.top;

        const nx = (pointer.x / rect.width) * 2 - 1;
        const ny = (pointer.y / rect.height) * 2 - 1;

        main.tx = clamp(pointer.x - orbMain.offsetWidth * 0.5, -40, rect.width - orbMain.offsetWidth + 40);
        main.ty = clamp(pointer.y - orbMain.offsetHeight * 0.5, -20, rect.height - orbMain.offsetHeight + 20);

        sub.tx = clamp(rect.width - pointer.x - orbSub.offsetWidth * 0.35, -20, rect.width - orbSub.offsetWidth + 20);
        sub.ty = clamp(rect.height * 0.65 - ny * 110, 40, rect.height - orbSub.offsetHeight - 20);

        titleState.tx = nx * 30;
        titleState.ty = ny * 12;
        titleState.tr = -4 + nx * 7 + ny * 1.4;
      }

      function resetPointer() {
        pointer.x = rect.width * 0.5;
        pointer.y = rect.height * 0.5;

        main.tx = rect.width * 0.08;
        main.ty = rect.height * 0.54;

        sub.tx = rect.width * 0.82;
        sub.ty = rect.height * 0.74;

        titleState.tx = 0;
        titleState.ty = 0;
        titleState.tr = -4;
      }

      function animate() {
        main.x = lerp(main.x, main.tx, 0.12);
        main.y = lerp(main.y, main.ty, 0.12);

        sub.x = lerp(sub.x, sub.tx, 0.085);
        sub.y = lerp(sub.y, sub.ty, 0.085);

        titleState.x = lerp(titleState.x, titleState.tx, 0.09);
        titleState.y = lerp(titleState.y, titleState.ty, 0.09);
        titleState.r = lerp(titleState.r, titleState.tr, 0.08);

        const mainScaleX = 1 + (main.tx - main.x) * 0.0016;
        const mainScaleY = 1 - (main.tx - main.x) * 0.0007 + Math.abs(main.ty - main.y) * 0.0005;

        const subScaleX = 1 + (sub.tx - sub.x) * 0.001;
        const subScaleY = 1 - (sub.tx - sub.x) * 0.0005;

        orbMain.style.transform =
          `translate3d(${main.x}px, ${main.y}px, 0) scale(${mainScaleX.toFixed(3)}, ${mainScaleY.toFixed(3)})`;

        orbSub.style.transform =
          `translate3d(${sub.x}px, ${sub.y}px, 0) scale(${subScaleX.toFixed(3)}, ${subScaleY.toFixed(3)})`;

        titleTrack.style.transform =
          `translate3d(${titleState.x}px, ${titleState.y}px, 0) rotate(${titleState.r}deg)`;

        const nameShiftX = (titleState.x * -0.38);
        const nameShiftY = (titleState.y * 0.18);
        const nameRotate = titleState.r * -0.72;

        namePart.style.transform =
          `translate3d(${nameShiftX}px, ${nameShiftY}px, 0) rotate(${nameRotate}deg)`;

        requestAnimationFrame(animate);
      }

      stage.addEventListener("mousemove", (e) => {
        setPointer(e.clientX, e.clientY);
      });

      stage.addEventListener("mouseleave", () => {
        resetPointer();
      });

      stage.addEventListener("touchstart", (e) => {
        refreshRect();
        if (e.touches[0]) {
          setPointer(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: true });

      stage.addEventListener("touchmove", (e) => {
        if (e.touches[0]) {
          setPointer(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: true });

      window.addEventListener("resize", () => {
        refreshRect();
        resetPointer();
      });

      resetPointer();
      animate();
    })();
  </script>
</body>
</html>
