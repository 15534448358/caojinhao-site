<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jinhao Hero Preview</title>
  <style>
    :root {
      --bg: #f7f7f3;
      --text: #111111;
      --muted: rgba(17,17,17,.42);
      --line: rgba(17,17,17,.08);
      --dot: rgba(17,17,17,.11);

      --plane-x: 0px;
      --plane-y: 0px;
      --plane-rx: 0deg;
      --plane-ry: 0deg;
      --plane-rz: -4deg;
      --plane-skew: 0deg;
      --plane-scale: 1;
      --persp-origin-x: 50%;
      --persp-origin-y: 50%;

      --mask-x: 160px;
      --mask-y: 420px;
      --mask-r: 122px;
      --overlay-opacity: 0;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      font-family: Inter, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 0) 0 0 / 24px 24px,
        var(--bg);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, transparent 74px, var(--line) 74px, var(--line) 75px, transparent 75px),
        linear-gradient(to right, transparent calc(50% - 740px), var(--line) calc(50% - 740px), var(--line) calc(50% - 739px), transparent calc(50% - 739px), transparent calc(50% + 739px), var(--line) calc(50% + 739px), var(--line) calc(50% + 740px), transparent calc(50% + 740px));
      z-index: 1;
    }

    .topbar {
      position: relative;
      z-index: 6;
      height: 74px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2em;
    }

    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      font-size: 13px;
      color: rgba(17,17,17,.72);
      padding: 8px 12px;
      border-radius: 999px;
      transition: transform .22s ease, background .22s ease, color .22s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: rgba(17,17,17,.06);
      color: rgba(17,17,17,.96);
    }

    .lang {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: rgba(17,17,17,.44);
    }

    .lang span:last-child {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(17,17,17,.12);
      background: rgba(255,255,255,.42);
      color: rgba(17,17,17,.84);
    }

    .stage {
      position: relative;
      min-height: calc(100vh - 74px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px 82px;
      isolation: isolate;
      z-index: 2;
    }

    .blob-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .blob-shadow::before {
      content: "";
      position: absolute;
      width: calc(var(--mask-r) * 2);
      height: calc(var(--mask-r) * 2);
      left: calc(var(--mask-x) - var(--mask-r));
      top: calc(var(--mask-y) - var(--mask-r));
      border-radius: 50%;
      background: #000;
    }

    .title-world {
      position: relative;
      width: min(1080px, 100%);
      display: flex;
      justify-content: center;
      perspective: 2400px;
      perspective-origin: var(--persp-origin-x) var(--persp-origin-y);
      z-index: 3;
      pointer-events: none;
      user-select: none;
    }

    .title-plane,
    .overlay-plane {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transform: translate3d(var(--plane-x), var(--plane-y), 0)
                 rotateX(var(--plane-rx))
                 rotateY(var(--plane-ry))
                 rotateZ(var(--plane-rz))
                 skewX(var(--plane-skew))
                 scale(var(--plane-scale));
      transform-origin: center center;
      will-change: transform;
    }

    .title-line,
    .overlay-line {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: clamp(10px, 1vw, 18px);
      white-space: nowrap;
      line-height: .9;
      letter-spacing: -.065em;
      will-change: transform;
    }

    .title-line { color: #111; }
    .overlay-line { color: #fff; }

    .title-main,
    .overlay-main {
      font-size: clamp(62px, 8.8vw, 132px);
      font-weight: 950;
    }

    .title-name,
    .overlay-name {
      font-size: clamp(58px, 7.8vw, 112px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -.1em;
    }

    .meta {
      margin-top: 14px;
      text-align: center;
      font-size: clamp(14px, 1.22vw, 18px);
      color: rgba(17,17,17,.44);
      letter-spacing: -.02em;
      pointer-events: none;
    }

    .overlay .meta {
      color: rgba(255,255,255,.54);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: var(--overlay-opacity);
      transition: opacity .12s ease;
      background: #000;
      -webkit-mask-image: radial-gradient(circle calc(var(--mask-r)) at var(--mask-x) var(--mask-y), #000 99%, transparent 100%);
      mask-image: radial-gradient(circle calc(var(--mask-r)) at var(--mask-x) var(--mask-y), #000 99%, transparent 100%);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
    }

    .overlay-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px 82px;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 12px;
      color: rgba(17,17,17,.3);
      user-select: none;
      white-space: nowrap;
    }

    @media (max-width: 960px) {
      .topbar {
        height: 64px;
        padding: 0 16px;
      }
      .hero::before {
        background: linear-gradient(to bottom, transparent 64px, var(--line) 64px, var(--line) 65px, transparent 65px);
      }
      .nav { gap: 4px; }
      .nav a { padding: 6px 8px; font-size: 12px; }
      .lang { display: none; }
      .stage, .overlay-inner { padding: 16px 16px 72px; }
      .title-main, .overlay-main { font-size: clamp(48px, 12vw, 92px); }
      .title-name, .overlay-name { font-size: clamp(44px, 10.2vw, 78px); }
      .meta { font-size: 14px; }
    }
  </style>
</head>
<body>
  <section class="hero" id="hero">
    <header class="topbar">
      <div class="brand">LEO</div>
      <nav class="nav">
        <a href="#">关于</a>
        <a href="#">技能</a>
        <a href="#">项目</a>
        <a href="#">合作</a>
      </nav>
      <div class="lang">
        <span>上海 闵行</span>
        <span>EN</span>
      </div>
    </header>

    <div class="stage" id="stage">
      <div class="blob-shadow"></div>

      <div class="title-world" id="titleWorld">
        <div class="title-plane">
          <div class="title-line">
            <span class="title-main">HELLO, I'M</span>
            <span class="title-name">Hao</span>
          </div>
          <div class="meta">AI Agent Engineer / 30岁 / 上海闵行</div>
        </div>
      </div>

      <div class="overlay" aria-hidden="true">
        <div class="overlay-inner">
          <div class="title-world">
            <div class="overlay-plane">
              <div class="overlay-line">
                <span class="overlay-main">你好，我是</span>
                <span class="overlay-name">曹晋昊</span>
              </div>
              <div class="meta">业务流程 / 系统实施 / 项目推进</div>
            </div>
          </div>
        </div>
      </div>

      <div class="hint">Move the pointer and watch the title keep tracking it</div>
    </div>
  </section>

  <script>
    (() => {
      const stage = document.getElementById('stage');
      const root = document.documentElement;
      const titleWorld = document.getElementById('titleWorld');
      if (!stage || !titleWorld) return;

      let stageRect = stage.getBoundingClientRect();
      let titleRect = titleWorld.getBoundingClientRect();
      let active = false;

      const circle = {
        x: stageRect.width * 0.12,
        y: stageRect.height * 0.58,
        tx: stageRect.width * 0.12,
        ty: stageRect.height * 0.58,
        r: 122,
        tr: 122
      };

      const plane = {
        x: 0, y: 0, rx: 0, ry: 0, rz: -4, sk: 0, sc: 1,
        tx: 0, ty: 0, trx: 0, try: 0, trz: -4, tsk: 0, tsc: 1
      };

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function lerp(a, b, n) {
        return a + (b - a) * n;
      }

      function signPow(v, p) {
        const s = Math.sign(v);
        return s * Math.pow(Math.abs(v), p);
      }

      function refreshRects() {
        stageRect = stage.getBoundingClientRect();
        titleRect = titleWorld.getBoundingClientRect();
      }

      function update(clientX, clientY) {
        const px = clientX - stageRect.left;
        const py = clientY - stageRect.top;

        circle.tx = clamp(px, 28, stageRect.width - 28);
        circle.ty = clamp(py, 56, stageRect.height - 28);
        circle.tr = 118 + Math.min(12, Math.hypot(circle.tx - circle.x, circle.ty - circle.y) * 0.045);

        const cx = (titleRect.left - stageRect.left) + titleRect.width * 0.5;
        const cy = (titleRect.top - stageRect.top) + titleRect.height * 0.5;
        const dx = px - cx;
        const dy = py - cy;

        const nx = clamp(dx / (titleRect.width * 0.48), -1, 1);
        const ny = clamp(dy / (titleRect.height * 0.82), -1, 1);
        const ex = signPow(nx, 0.78);
        const ey = signPow(ny, 0.82);
        const dist = Math.min(1, Math.hypot(ex, ey));
        const angle = Math.atan2(dy, dx);

        plane.tx = ex * 6;
        plane.ty = ey * 2;
        plane.trx = -ey * (20 + dist * 8);
        plane.try = ex * (34 + dist * 10);
        plane.trz = -4 + ex * 4 + Math.sin(angle) * 1.4 * dist;
        plane.tsk = -ex * 6.5 - ey * 1.2;
        plane.tsc = 1 + dist * 0.012;

        root.style.setProperty('--persp-origin-x', `${50 + ex * 20}%`);
        root.style.setProperty('--persp-origin-y', `${50 + ey * 18}%`);
      }

      function reset() {
        circle.tx = stageRect.width * 0.12;
        circle.ty = stageRect.height * 0.58;
        circle.tr = 122;

        plane.tx = 0;
        plane.ty = 0;
        plane.trx = 0;
        plane.try = 0;
        plane.trz = -4;
        plane.tsk = 0;
        plane.tsc = 1;

        root.style.setProperty('--persp-origin-x', '50%');
        root.style.setProperty('--persp-origin-y', '50%');
      }

      function loop() {
        circle.x = lerp(circle.x, circle.tx, 0.12);
        circle.y = lerp(circle.y, circle.ty, 0.12);
        circle.r = lerp(circle.r, circle.tr, 0.12);

        plane.x = lerp(plane.x, plane.tx, 0.12);
        plane.y = lerp(plane.y, plane.ty, 0.12);
        plane.rx = lerp(plane.rx, plane.trx, 0.12);
        plane.ry = lerp(plane.ry, plane.try, 0.12);
        plane.rz = lerp(plane.rz, plane.trz, 0.12);
        plane.sk = lerp(plane.sk, plane.tsk, 0.12);
        plane.sc = lerp(plane.sc, plane.tsc, 0.12);

        root.style.setProperty('--mask-x', `${circle.x.toFixed(1)}px`);
        root.style.setProperty('--mask-y', `${circle.y.toFixed(1)}px`);
        root.style.setProperty('--mask-r', `${circle.r.toFixed(1)}px`);
        root.style.setProperty('--overlay-opacity', active ? '1' : '0');

        root.style.setProperty('--plane-x', `${plane.x.toFixed(1)}px`);
        root.style.setProperty('--plane-y', `${plane.y.toFixed(1)}px`);
        root.style.setProperty('--plane-rx', `${plane.rx.toFixed(2)}deg`);
        root.style.setProperty('--plane-ry', `${plane.ry.toFixed(2)}deg`);
        root.style.setProperty('--plane-rz', `${plane.rz.toFixed(2)}deg`);
        root.style.setProperty('--plane-skew', `${plane.sk.toFixed(2)}deg`);
        root.style.setProperty('--plane-scale', plane.sc.toFixed(4));

        requestAnimationFrame(loop);
      }

      stage.addEventListener('mouseenter', (e) => {
        active = true;
        refreshRects();
        update(e.clientX, e.clientY);
      });

      stage.addEventListener('mousemove', (e) => {
        active = true;
        update(e.clientX, e.clientY);
      });

      stage.addEventListener('mouseleave', () => {
        active = false;
        reset();
      });

      stage.addEventListener('touchstart', (e) => {
        refreshRects();
        active = true;
        if (e.touches[0]) update(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      stage.addEventListener('touchmove', (e) => {
        active = true;
        if (e.touches[0]) update(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      stage.addEventListener('touchend', () => {
        active = false;
        reset();
      }, { passive: true });

      window.addEventListener('resize', () => {
        refreshRects();
        reset();
      });

      refreshRects();
      reset();
      loop();
    })();
  </script>
</body>
</html>
